<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <title>数字弹球：下压循环 Demo</title>
    <link rel="stylesheet" href="./styles.css?v=recall-1" />
  </head>
  <body>
    <main class="shell">
      <section class="hud" aria-label="游戏状态">
        <div>
          <span class="label">波次</span>
          <strong id="round">1</strong>
        </div>
        <div>
          <span class="label">球</span>
          <strong id="balls">8</strong>
        </div>
        <div>
          <span class="label">连击</span>
          <strong id="combo">0</strong>
        </div>
        <div>
          <span class="label">倍率</span>
          <strong id="multiplier">x1.0</strong>
        </div>
      </section>

      <section class="game-wrap">
        <canvas id="game" aria-label="数字弹球游戏画布"></canvas>
        <div class="toast" id="toast">拖动瞄准，循环太久可归位</div>
      </section>

      <section class="control-panel">
        <button class="icon-button" id="resetBtn" aria-label="重新开始">↻</button>
        <div class="power-readout">
          <span id="mode">瞄准中</span>
          <strong id="skillLine">无技能</strong>
        </div>
        <button class="secondary-button" id="recallBtn" aria-label="归位所有弹球">归位</button>
        <button class="primary-button" id="launchBtn">发射</button>
      </section>
    </main>

    <div class="modal hidden" id="upgradeModal" role="dialog" aria-modal="true">
      <div class="upgrade-sheet">
        <p class="modal-kicker">技能升级</p>
        <h1>选择一个强化</h1>
        <div id="upgradeChoices" class="upgrade-grid"></div>
      </div>
    </div>

    <div class="modal hidden" id="endModal" role="dialog" aria-modal="true">
      <div class="upgrade-sheet">
        <p class="modal-kicker" id="endKicker">本局结束</p>
        <h1 id="endTitle">数字压到底线了</h1>
        <p id="endCopy" class="end-copy"></p>
        <button class="primary-button full" id="restartBtn">再来一局</button>
      </div>
    </div>

    <script src="./app.js?v=recall-1"></script>
  </body>
</html>
